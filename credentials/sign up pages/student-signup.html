<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../template.css">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Student Sign Up</title>
</head>
<body>
    <div class="main-container">
        <p class="text student">Student</p>
        <p class="text sign-up">Sign up</p>
        <div class="input-boxes">
            <input class="text" placeholder="Enter student ID number">
            <input class="text" placeholder="Enter password">
        </div>
        <p class="text extra-info"><a href="#" class="forgot-pass">Forgot password?</a></p>
        <button class="btn text">Create account</button>
        <p class="text extra-info">Already have an account? <a href="#" class="login-link">Log in</a></p>
    </div>
</body>
</html>
